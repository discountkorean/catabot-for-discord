# ==========================================
#      SHOPIFY STOCK MONITOR — CONFIG
# ==========================================
# Use /stop then /start in Discord after making changes.

[discord]
# token loaded from .env → DISCORD_TOKEN
activity_type = "Watching"   # options: watching, playing, listening, competing
activity = "Restock Alerts 🔔"

[monitor]
poll_interval = 300  # seconds between each check (300 = 5 minutes)

# Base list of stores. Use /addstore and /removestore in Discord to manage at runtime.
# Format: "Display Name" = "https://store.com/products.json?limit=1000"
